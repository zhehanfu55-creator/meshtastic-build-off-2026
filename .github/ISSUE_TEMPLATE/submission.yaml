name: Project Submission
description: Submit your Meshtastic Build-Off 2026 project
title: "[Submission] "
labels: ["submission"]
body:
  - type: text
    id: name
    attributes:
      label: Your Name
      description: Full name
      placeholder: "John Doe"
    validations:
      required: true

  - type: text
    id: email
    attributes:
      label: Email
      description: Your email address
      placeholder: "john@example.com"
    validations:
      required: true

  - type: text
    id: phone
    attributes:
      label: Phone Number
      description: Phone number with country code (e.g., +1-555-123-4567)
      placeholder: "+1-555-123-4567"
    validations:
      required: true

  - type: text
    id: github_repo
    attributes:
      label: GitHub Repository Link
      description: Link to your public GitHub repository with the project code
      placeholder: "https://github.com/username/project-repo"
    validations:
      required: true

  - type: textarea
    id: project_description
    attributes:
      label: Project Description
      description: Brief description of your project and what it does
      placeholder: "Describe your project here..."
    validations:
      required: true

  - type: textarea
    id: tech_stack
    attributes:
      label: Tech Stack
      description: List the technologies, frameworks, and tools you used
      placeholder: "- Python\n- React\n- Node.js\n- etc."
    validations:
      required: true

  - type: textarea
    id: additional_message
    attributes:
      label: Message to the Organizers
      description: Anything else you'd like to share with us
      placeholder: "Tell us anything special about your project..."
    validations:
      required: false
