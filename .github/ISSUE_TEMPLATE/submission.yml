name: Project Submission
description: Submit your Meshtastic Build-Off 2026 project
title: "[Submission] "
labels: [submission]
body:
  - type: text
    id: name
    attributes:
      label: Your Name
      placeholder: John Doe
    validations:
      required: true
  - type: text
    id: email
    attributes:
      label: Email
      placeholder: john@example.com
    validations:
      required: true
  - type: text
    id: phone
    attributes:
      label: Phone Number
      placeholder: "+1-555-123-4567"
    validations:
      required: true
  - type: text
    id: github_repo
    attributes:
      label: GitHub Repository Link
      placeholder: https://github.com/username/project
    validations:
      required: true
  - type: textarea
    id: project_description
    attributes:
      label: Project Description
      placeholder: Describe your project
    validations:
      required: true
  - type: textarea
    id: tech_stack
    attributes:
      label: Tech Stack
      placeholder: List technologies used
    validations:
      required: true
  - type: textarea
    id: additional_message
    attributes:
      label: Message to Organizers
      placeholder: Optional message
    validations:
      required: false
